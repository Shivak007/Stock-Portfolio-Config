server.port=8084
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
price.fetch.interval=300000
price.external.api-key=${FINNHUB_API_KEY}
price.external.base-url=https://finnhub.io/api/v1/quote
resilience4j.retry.instances.finnhubRetry.max-attempts=3
resilience4j.retry.instances.finnhubRetry.wait-duration=2s
resilience4j.circuitbreaker.instances.finnhubCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.finnhubCircuitBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.finnhubCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.finnhubCircuitBreaker.wait-duration-in-open-state=30s
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
