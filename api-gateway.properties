server.port=8080
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[2].id=portfolio-service
spring.cloud.gateway.routes[2].uri=lb://portfolio-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/portfolios/**,/api/holdings/**
spring.cloud.gateway.routes[3].id=price-fetcher-service
spring.cloud.gateway.routes[3].uri=lb://price-fetcher-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/prices/**
spring.cloud.gateway.routes[4].id=alert-service
spring.cloud.gateway.routes[4].uri=lb://alert-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/alerts/**
spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://notification-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[6].id=report-service
spring.cloud.gateway.routes[6].uri=lb://report-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/reports/**
spring.data.redis.host=localhost
spring.data.redis.port=6379
app.jwt.secret=${JWT_SECRET}
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=User Service
springdoc.swagger-ui.urls[1].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Portfolio Service
springdoc.swagger-ui.urls[2].url=/portfolio-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Price Service
springdoc.swagger-ui.urls[3].url=/price-fetcher-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=Alert Service
springdoc.swagger-ui.urls[4].url=/alert-service/v3/api-docs
springdoc.swagger-ui.urls[5].name=Report Service
springdoc.swagger-ui.urls[5].url=/report-service/v3/api-docs
