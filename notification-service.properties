server.port=8086
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MY_EMAIL_ID}
spring.mail.password=${MY_EMAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
rabbitmq.exchange=portfolio.exchange
rabbitmq.dlx=portfolio.dlx
rabbitmq.queues.notification=notification.queue
rabbitmq.queues.dlq=notification.dlq
rabbitmq.routing-keys.user-registered=user.registered
rabbitmq.routing-keys.alert-triggered=alert.triggered
rabbitmq.routing-keys.daily-summary=report.daily_summary
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
